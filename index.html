<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SOLARDESIGN — PARU ENS</title>
<meta name="theme-color" content="#2da84a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#161b22;border:1px solid #30363d;border-radius:20px;padding:40px 32px;width:100%;max-width:420px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.7)}
.icon{width:100px;height:100px;border-radius:22px;margin:0 auto 20px;display:block}
h1{font-size:26px;font-weight:900;color:#fff;letter-spacing:1px;margin-bottom:4px}
.sub{font-size:12px;color:#2da84a;letter-spacing:4px;margin-bottom:32px}
.desc{font-size:13px;color:#8b949e;line-height:1.7;margin-bottom:28px}
.divider{border:none;border-top:1px solid #30363d;margin:24px 0}
.label{font-size:12px;color:#8b949e;text-align:left;margin-bottom:6px;font-weight:600}
input[type=password]{width:100%;background:#0d1117;border:1px solid #444c56;color:#e6edf3;border-radius:8px;padding:12px 16px;font-size:18px;font-family:inherit;text-align:center;letter-spacing:8px;margin-bottom:10px}
input[type=password]:focus{outline:none;border-color:#2da84a}
.error{color:#f85149;font-size:12px;margin-bottom:10px;display:none}
.btn-dl{width:100%;background:#2da84a;border:none;color:#fff;padding:14px;border-radius:10px;cursor:pointer;font-size:15px;font-weight:700;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;transition:.15s}
.btn-dl:hover{background:#22963a}
.btn-dl:disabled{background:#1c3a1c;color:#444;cursor:not-allowed}
.features{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px;text-align:left}
.feat{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:10px 12px}
.feat-icon{font-size:18px;margin-bottom:4px}
.feat-text{font-size:11px;color:#8b949e;line-height:1.4}
.install-guide{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:12px;margin-top:16px;text-align:left}
.install-guide-title{font-size:11px;color:#2da84a;font-weight:700;margin-bottom:8px}
.install-step{font-size:11px;color:#8b949e;margin-bottom:4px;display:flex;gap:6px}
</style>
</head>

  var val = (inp ? inp.value.trim().toUpperCase() : '');
  var ok = ACCESS_CODES.some(function(c){ return c.toUpperCase()===val; });
  if (!ok) {
    err.style.display = 'block';
    if(inp){ inp.value=''; inp.style.borderColor='#f85149'; inp.focus();
      setTimeout(function(){inp.style.borderColor='#444c56';},1500); }
    return;
  }
  err.style.display = 'none';
  /* 다운로드 */
  var a = document.createElement('a');
  a.href = APP_FILE;
  a.download = 'SOLARDESIGN_PARUENS.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  /* 성공 메시지 */
  var btn = document.querySelector('.btn-dl');
  if(btn){ btn.innerHTML='<span>✅</span><span>다운로드 시작됨!</span>'; btn.style.background='#1a5c2a';
    setTimeout(function(){ btn.innerHTML='<span>📥</span><span>앱 다운로드</span>'; btn.style.background='#2da84a'; },3000); }
};
</script>
</body>
</html>
